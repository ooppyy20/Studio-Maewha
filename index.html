<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--cream:#FDFCF8;--warm:#c4bcb5;--ink:#000;--ink-light:#6C5F65;--accent:#9b2682;--accent-light:#996c90;}
html,body{background:var(--cream);color:var(--ink);font-family:'Pretendard',serif;overflow-x:hidden}
body{padding:0 clamp(0.75rem,3vw,1.5rem)}

header{background:var(--cream);padding:3rem 0 2rem;text-align:center}
.deco-svg{display:block;width:clamp(160px,30vw,190px);height:auto;margin:0 auto;}
.deco-svg path{fill:var(--accent-light)}
.brand-name{font-family:'koPubWorldBatang',serif;font-size:clamp(60px,10vw,60px);letter-spacing:-0.06em;line-height:0.95}
.contact-strip{display:flex;flex-wrap:wrap;justify-content:center;margin-top:.75rem;padding-top:0.6rem}
.citem{padding:3px clamp(8px,3vw,18px);text-align:center;font-size:clamp(10px,2.5vw,12px)}
.citem span{display:block;font-size:clamp(8px,1.8vw,10px);letter-spacing:0.15em;color:var(--ink-light);margin-bottom:1px}

nav{background:var(--cream);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;padding:11px clamp(12px,3.5vw,20px);font-family:'Pretendard',serif;font-size:clamp(10px,2.5vw,12px);letter-spacing:0.12em;color:var(--ink-light);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:color 0.2s}
.nav-btn.active{color:var(--ink);font-weight:600;}

.admin-btn{background:none;border:none;cursor:pointer;padding:6px;position:absolute;right:0.5rem;top:0.5rem;align-items:center;justify-content:center;opacity:0.55;transition:opacity 0.2s}
.admin-btn:hover{opacity:1}
.admin-btn svg{width:22px;height:22px;fill:var(--ink)}

#grid-wrap{padding:0.75rem clamp(0.75rem,3vw,1.5rem) 3rem;position:relative}
#grid{display:grid;gap:clamp(6px,2vw,10px);grid-template-columns:1fr}
@media(min-width:420px){#grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:600px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:860px){#grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1100px){#grid{grid-template-columns:repeat(5,1fr)}}

.card-wrap{display:flex;flex-direction:column;cursor:pointer}
.card-img{overflow:hidden;background:var(--warm);aspect-ratio:3/4;position:relative;border-radius:2px;}
@media(max-width:419px){.card-img{aspect-ratio:4/3}}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(1.04)saturate(0.88)sepia(0.09);transition:transform 0.5s cubic-bezier(.25,.46,.45,.94);pointer-events:none;}
@media(hover:hover){.card-wrap:hover .card-img img{transform:scale(1.05)}}
.card-name{padding:clamp(6px,2vw,10px) 2px clamp(12px,3vw,18px);font-size:clamp(11px,2.5vw,12px);letter-spacing:0.06em;color:var(--ink-light);transition:color 0.2s;line-height:1.4}
@media(hover:hover){.card-wrap:hover .card-name{color:var(--ink);}}
.card-wrap{opacity:0;transform:translateY(16px);transition:opacity 0.48s ease,transform 0.48s ease}
.card-wrap.revealed{opacity:1;transform:translateY(0)}


.overlay{display:none;position:fixed;inset:0;background:rgba(28,26,22,0.55);z-index:1000;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center}}
.overlay.show{display:flex}
.modal{background:var(--cream);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:clamp(1.2rem,5vw,2rem);border-radius:10px;}
.modal-title{font-family:'koPubWorldBatang',serif;font-size:clamp(22px,5vw,26px);font-weight:300;margin-bottom:1.1rem}
.field{margin-bottom:0.9rem}
.field label{display:block;font-size:clamp(9px,2vw,10px);letter-spacing:0.15em;color:var(--ink-light);margin-bottom:5px}
.field input{width:100%;padding:clamp(9px,2.5vw,11px) 12px;background:var(--warm);border:none;font-family:'Pretendard',serif;font-size:clamp(12px,3vw,13px);color:var(--ink);outline:none;-webkit-appearance:none;border-radius:0}
.btn-row{display:flex;gap:8px;margin-top:1rem}
.btn-p{flex:1;padding:clamp(10px,2.5vw,12px);background:var(--ink);color:var(--cream);border:none;font-family:'Pretendard',serif;font-size:clamp(11px,2.5vw,12px);letter-spacing:0.12em;cursor:pointer;border-radius:0}
.btn-s{padding:clamp(10px,2.5vw,12px) 16px;background:transparent;border:0.5px solid var(--accent-light);font-family:'Pretendard',serif;font-size:clamp(11px,2.5vw,12px);color:var(--ink-light);cursor:pointer;border-radius:0}
.tab-row{display:flex;margin-bottom:1.2rem}
.tab{padding:9px 18px;font-size:clamp(10px,2.5vw,11px);letter-spacing:0.12em;background:none;border:none;color:var(--ink-light);cursor:pointer;margin-bottom:-0.5px}
.tab.on{color:var(--ink);background:var(--accent-light);}
.di{display:flex;align-items:center;padding:11px 0;gap:10px}
.di img{width:40px;height:40px;object-fit:cover;flex-shrink:0}
.di-info{flex:1;min-width:0}
.di-cat{font-size:9px;color:var(--accent);letter-spacing:0.1em;margin-bottom:2px}
.di-name{font-size:12px;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-x{background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:16px;padding:6px 8px;flex-shrink:0}
.msg{font-size:12px;margin-top:7px;letter-spacing:0.04em}
.err{color:#c0392b}.suc{color:var(--accent)}
.upload-box{border:0.5px dashed var(--accent-light);padding:18px;text-align:center;cursor:pointer;color:var(--ink-light);font-size:clamp(11px,2.5vw,12px);letter-spacing:0.06em}
</style>

  <div id="grid"></div>

<div class="overlay" id="auth-ov">
  <div class="modal">
    <p class="modal-title">관리자</p>
    <div class="field"><label>관리자 코드</label>
      <input type="password" id="auth-in" onkeydown="if(event.key==='Enter')checkAuth()" placeholder="비밀번호 입력">
    </div>
    <p class="msg err" id="auth-err" style="display:none">코드가 일치하지 않습니다.</p>
    <div class="btn-row">
      <button class="btn-p" onclick="checkAuth()">확인</button>
      <button class="btn-s" onclick="closeOv('auth-ov')">취소</button>
    </div>
  </div>
</div>

<div class="overlay" id="adm-ov">
  <div class="modal">
    <p class="modal-title">상품 관리</p>
    <div class="tab-row">
      <button class="tab on" onclick="switchTab('add',this)">상품 등록</button>
      <button class="tab" onclick="switchTab('del',this)">상품 삭제</button>
    </div>
    <div id="tab-add">
      <div class="field"><label>상품 사진</label>
        <div class="upload-box" onclick="document.getElementById('img-file').click()">클릭하여 이미지 업로드</div>
        <input type="file" id="img-file" accept="image/*" style="display:none" onchange="previewImg(this)">
        <img id="img-prev" style="width:100%;height:140px;object-fit:cover;display:none;margin-top:8px">
      </div>
      <div class="field"><label>카테고리</label>
        <input type="text" id="add-cat" list="cat-list" placeholder="예: 팔찌, 키링, 소품..."><datalist id="cat-list"></datalist>
      </div>
      <div class="field"><label>상품명</label><input type="text" id="add-name" placeholder="상품 이름 입력"></div>
      <p class="msg err" id="add-err" style="display:none"></p>
      <p class="msg suc" id="add-suc" style="display:none">등록되었습니다.</p>
      <div class="btn-row">
        <button class="btn-p" onclick="addProduct()">등록하기</button>
        <button class="btn-s" onclick="closeOv('adm-ov')">닫기</button>
      </div>
    </div>
    <div id="tab-del" style="display:none">
      <div id="del-list" style="max-height:300px;overflow-y:auto"></div>
      <div class="btn-row" style="margin-top:1rem; justify-content: flex-end;">
        <button class="btn-s" onclick="closeOv('adm-ov')">닫기</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://studio-maewha.up.railway.app';
let currentCat = 'all', imgFile = null, adminInput = null;
let products = [];

// 1. 서버에서 상품 목록을 가져오는 함수
async function loadProducts() {
  try {
    const response = await fetch(`${API}/api/products`);
    const data = await response.json();
    
    products = data.map(p => ({
      id: p.id,
      category: p.category,
      name: p.name,
      image: p.image_url 
    }));

    console.log("상품 로드 완료:", products);

    if (!products || products.length === 0) {
      products = [
        {id: 1, category: '샘플', name: '샘플 상품', image: 'https://images.unsplash.com/photo-1614484691701-709df3fec2ac?w=400&q=75'},
      ];
    }

    renderNav();
    renderGrid();

  } catch (error) {
    console.error("데이터를 가져오는데 실패했습니다:", error);
    products = [
      {id: 1, category: '샘플', name: '샘플 상품(로컬서버오류)', image: 'https://images.unsplash.com/photo-1614484691701-709df3fec2ac?w=400&q=75'},
    ];
    renderNav();
    renderGrid();
  }
}

// 2. 관리자 인증 요청
async function checkAuth() {
  adminInput = document.getElementById('auth-in').value.trim();
  
  try {
    const response = await fetch(`${API}/api/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: adminInput })
    });
    const data = await response.json();

    if (data.ok) {
      closeOv('auth-ov');
      openAdminModal(); // [개선 3] 인증 성공 시 메시지 초기화 로직이 담긴 전용 함수 호출
    } else {
      document.getElementById('auth-err').style.display = 'block';
      adminInput = null;
    }
  } catch (err) {
    console.error("인증 에러:", err);
    document.getElementById('auth-err').textContent = "서버 연결에 실패했습니다.";
    document.getElementById('auth-err').style.display = 'block';
  }
}

// [개선 3] 상품 관리 모달창을 열 때 이전의 성공/에러 메시지를 깨끗하게 지우는 함수
function openAdminModal() {
  document.getElementById('add-err').style.display = 'none';
  document.getElementById('add-suc').style.display = 'none';
  
  updateCatList();
  renderDelList();
  showOv('adm-ov');
  
  // 첫 번째 탭(상품 등록)으로 초기화
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', i === 0));
  document.getElementById('tab-add').style.display = 'block';
  document.getElementById('tab-del').style.display = 'none';
}

function renderNav(){
  const nav=document.getElementById('nav');
  const cats=['전체',...new Set(products.map(p=>p.category))];
  nav.innerHTML=cats.map(cat=>{
    const on=(cat==='전체'&&currentCat==='all')||(cat===currentCat);
    return`<button class="nav-btn${on?' active':''}" onclick="selectCat('${cat}')">${cat}</button>`;
  }).join('');
}

function selectCat(cat){
  currentCat=cat==='전체'?'all':cat;
  renderNav();renderGrid();
  document.getElementById('grid-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const list=currentCat==='all'?products:products.filter(p=>p.category===currentCat);
  grid.innerHTML=list.map(p=>`
    <div class="card-wrap">
      <div class="card-img"><img src="${p.image}" alt="${p.name}" loading="lazy"></div>
      <div class="card-name">${p.name}</div>
    </div>`).join('');
  initReveal();
}

let revealIO=null;
function initReveal(){
  if(revealIO)revealIO.disconnect();
  revealIO=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const delay=parseInt(e.target.dataset.col||0)*55;
        setTimeout(()=>e.target.classList.add('revealed'),delay);
        revealIO.unobserve(e.target);
      }
    });
  },{threshold:0.06,rootMargin:'0px 0px -20px 0px'});
  const cols=getCols();
  document.querySelectorAll('.card-wrap').forEach((c,i)=>{c.dataset.col=i%cols;revealIO.observe(c)});
}

function getCols(){
  const w=window.innerWidth;
  if(w>=1100)return 5;
  if(w>=860)return 4;
  if(w>=600)return 3;
  if(w>=420)return 2;
  return 1;
}

/* MODALS */
function showOv(id){document.getElementById(id).classList.add('show')}
function closeOv(id){document.getElementById(id).classList.remove('show')}
function openAuth(){
  document.getElementById('auth-err').style.display='none';
  document.getElementById('auth-in').value='';
  showOv('auth-ov');
  setTimeout(()=>document.getElementById('auth-in').focus(),100);
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-add').style.display=tab==='add'?'block':'none';
  document.getElementById('tab-del').style.display=tab==='del'?'block':'none';
  if(tab==='del')renderDelList();
}
function updateCatList(){
  document.getElementById('cat-list').innerHTML=[...new Set(products.map(p=>p.category))].map(c=>`<option value="${c}">`).join('');
}

function previewImg(input){
  if(!input.files||!input.files[0])return;
  imgFile = input.files[0];
  const r=new FileReader();
  r.onload=e=>{
    const p=document.getElementById('img-prev');
    p.src=e.target.result;
    p.style.display='block';
  };
  r.readAsDataURL(imgFile);
}

// 업로드 전 클라이언트 리사이즈 (최대 1200px, 품질 80%)
function compressImage(file, maxPx = 1200, quality = 0.80) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width: w, height: h } = img;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else       { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(resolve, 'image/jpeg', quality);
    };
    img.src = url;
  });
}

// [개선 1 & 3] 상품 등록 비동기 처리 개선
async function addProduct(){
  const cat=document.getElementById('add-cat').value.trim();
  const name=document.getElementById('add-name').value.trim();
  const err=document.getElementById('add-err'),suc=document.getElementById('add-suc');
  const btn = document.querySelector('#tab-add .btn-p'); // 등록하기 버튼 선택
  
  err.style.display='none';
  suc.style.display='none';
  
  if(!imgFile||!cat||!name){
    err.textContent='사진, 카테고리, 상품명을 모두 입력해 주세요.';
    err.style.display='block';
    return;
  }

  // [개선 1] 등록 과정 UI 처리 (버튼 비활성화 및 텍스트 변경)
  btn.disabled = true;
  btn.textContent = '등록 중...';
  btn.style.opacity = '0.6';
  btn.style.cursor = 'not-allowed';

  const form = new FormData();
  form.append('category', cat);
  form.append('name', name);
  form.append('adminToken', adminInput);

  const compressed = await compressImage(imgFile);
  form.append('image', compressed, imgFile.name);

  try {
    const response = await fetch(`${API}/api/products`, { method: 'POST', body: form });
    if (!response.ok) throw new Error('서버 등록 실패');
    
    const newProduct = await response.json();
    
    products.unshift({
      id: newProduct.id,
      category: newProduct.category,
      name: newProduct.name,
      image: newProduct.image_url
    });

    suc.textContent = '등록되었습니다.';
    suc.style.display='block';
    
    // 입력 폼 초기화
    document.getElementById('add-cat').value='';
    document.getElementById('add-name').value='';
    document.getElementById('img-file').value='';
    document.getElementById('img-prev').style.display='none';
    imgFile=null;
    
    updateCatList();renderNav();renderGrid();
  } catch (error) {
    console.error(error);
    err.textContent = "상품 등록에 실패했습니다.";
    err.style.display = 'block';
  } finally {
    // [개선 1] 등록 작업이 끝나면 (성공이든 실패든) 버튼 원상복구
    btn.disabled = false;
    btn.textContent = '등록하기';
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
  }
}

function renderDelList(){
  const dl=document.getElementById('del-list');
  if(!products.length){dl.innerHTML='<p style="font-size:13px;color:var(--ink-light);padding:1rem 0">등록된 상품이 없습니다.</p>';return}
  dl.innerHTML=products.map(p=>`
    <div class="di">
      <img src="${p.image}" alt="${p.name}">
      <div class="di-info"><div class="di-cat">${p.category}</div><div class="di-name">${p.name}</div></div>
      <button class="btn-x" onclick="delProduct(${p.id})">✕</button>
    </div>`).join('');
}

async function delProduct(id){
  if(!confirm("정말 이 상품을 삭제하시겠습니까?")) return;
  
  try {
    const response = await fetch(`${API}/api/products/${id}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminToken: adminInput })
    });
    
    if(response.ok) {
      products=products.filter(p=>p.id!==id);
      renderDelList();
      renderNav();
      renderGrid();
    } else {
      alert("삭제 실패: 권한이 없거나 오류가 발생했습니다.");
    }
  } catch(err) {
    console.error(err);
  }
}

// 페이지 로드 시 시작
loadProducts();

let rT;
window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(()=>{initReveal()},200)});
</script>
