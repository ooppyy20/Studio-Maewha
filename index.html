<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--cream:#FDFCF8;--warm:#c4bcb5;--ink:#000;--ink-light:#6C5F65;--accent:#9b2682;--accent-light:#d6bcd1;}
html,body{background:var(--cream);color:var(--ink);font-family:'Pretendard',serif;overflow-x:hidden}
body{padding:0 clamp(0.75rem,3vw,1.5rem)}

header{background:var(--cream);padding:5rem 0;text-align:center}
.brand-name{font-family:'koPubWorldBatang',serif;font-size:clamp(60px,10vw,60px);letter-spacing:-0.06em;line-height:0.95}
.brand-sub{font-size:clamp(9px,2vw,10px);font-weight:500;letter-spacing:0.22em;color:var(--accent);margin-top:3px}
.contact-strip{display:flex;flex-wrap:wrap;justify-content:center;margin-top:.75rem;padding-top:0.6rem}
.citem{padding:3px clamp(8px,3vw,18px);text-align:center;font-size:clamp(10px,2.5vw,12px)}
.citem span{display:block;font-size:clamp(8px,1.8vw,10px);letter-spacing:0.15em;color:var(--ink-light);margin-bottom:1px}

nav{background:var(--cream);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;margin:11px clamp(12px,3.5vw,20px);font-family:'Pretendard',serif;font-size:clamp(10px,2.5vw,12px);letter-spacing:0.12em;color:var(--ink-light);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:color 0.2s}
.nav-btn.active{color:var(--ink);font-weight:500;background-color:var(--accent-light);border: 5px solid var(--accent-light);}

.admin-btn{background:none;border:none;cursor:pointer;padding:6px;position:absolute;right:0.5rem;top:0.5rem;align-items:center;justify-content:center;opacity:0.55;transition:opacity 0.2s}
.admin-btn:hover{opacity:1}
.admin-btn svg{width:22px;height:22px;fill:var(--ink)}

#grid-wrap{padding:0.75rem clamp(0.75rem,3vw,1.5rem) 3rem;position:relative}
#grid{display:grid;gap:clamp(6px,2vw,10px);grid-template-columns:1fr}
@media(min-width:420px){#grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:600px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:860px){#grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1100px){#grid{grid-template-columns:repeat(5,1fr)}}

.card-wrap{display:flex;flex-direction:column;cursor:pointer}
.card-img{overflow:hidden;background:var(--warm);aspect-ratio:3/4;position:relative;border-radius:2px;}
@media(max-width:419px){.card-img{aspect-ratio:4/3}}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(1.04)saturate(0.88)sepia(0.09);transition:transform 0.5s cubic-bezier(.25,.46,.45,.94)}
@media(hover:hover){.card-wrap:hover .card-img img{transform:scale(1.05)}}
.card-name{padding:clamp(6px,2vw,10px) 2px clamp(12px,3vw,18px);font-size:clamp(11px,2.5vw,12px);letter-spacing:0.06em;color:var(--ink-light);transition:color 0.2s;line-height:1.4}
@media(hover:hover){.card-wrap:hover .card-name{color:var(--ink);}}
.card-wrap{opacity:0;transform:translateY(16px);transition:opacity 0.48s ease,transform 0.48s ease}
.card-wrap.revealed{opacity:1;transform:translateY(0)}

#fx-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:2;opacity:0.5}

.overlay{display:none;position:fixed;inset:0;background:rgba(28,26,22,0.55);z-index:1000;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center}}
.overlay.show{display:flex}
.modal{background:var(--cream);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:clamp(1.2rem,5vw,2rem);border-radius:10px;}
.modal-title{font-family:'koPubWorldBatang',serif;font-size:clamp(22px,5vw,26px);font-weight:300;margin-bottom:1.1rem}
.field{margin-bottom:0.9rem}
.field label{display:block;font-size:clamp(9px,2vw,10px);letter-spacing:0.15em;color:var(--ink-light);margin-bottom:5px}
.field input{width:100%;padding:clamp(9px,2.5vw,11px) 12px;background:var(--warm);border:none;font-family:'Pretendard',serif;font-size:clamp(12px,3vw,13px);color:var(--ink);outline:none;-webkit-appearance:none;border-radius:0}
.btn-row{display:flex;gap:8px;margin-top:1rem}
.btn-p{flex:1;padding:clamp(10px,2.5vw,12px);background:var(--ink);color:var(--cream);border:none;font-family:'Pretendard',serif;font-size:clamp(11px,2.5vw,12px);letter-spacing:0.12em;cursor:pointer;border-radius:0}
.btn-s{padding:clamp(10px,2.5vw,12px) 16px;background:transparent;border:0.5px solid var(--accent-light);font-family:'Pretendard',serif;font-size:clamp(11px,2.5vw,12px);color:var(--ink-light);cursor:pointer;border-radius:0}
.tab-row{display:flex;margin-bottom:1.2rem}
.tab{padding:9px 18px;font-size:clamp(10px,2.5vw,11px);letter-spacing:0.12em;background:none;border:none;color:var(--ink-light);cursor:pointer;margin-bottom:-0.5px}
.tab.on{color:var(--ink);background:var(--accent-light);}
.di{display:flex;align-items:center;padding:11px 0;gap:10px}
.di img{width:40px;height:40px;object-fit:cover;flex-shrink:0}
.di-info{flex:1;min-width:0}
.di-cat{font-size:9px;color:var(--accent);letter-spacing:0.1em;margin-bottom:2px}
.di-name{font-size:12px;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-x{background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:16px;padding:6px 8px;flex-shrink:0}
.msg{font-size:12px;margin-top:7px;letter-spacing:0.04em}
.err{color:#c0392b}.suc{color:var(--accent)}
.upload-box{border:0.5px dashed var(--accent-light);padding:18px;text-align:center;cursor:pointer;color:var(--ink-light);font-size:clamp(11px,2.5vw,12px);letter-spacing:0.06em}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const ADMIN_CODE='1234';
let products=JSON.parse(localStorage.getItem('sori_p')||'null');
let currentCat='all', imgData=null;

if(!products){
  products=[
    {id:1,category:'샘플',name:'샘플 상품',image:'https://images.unsplash.com/photo-1614484691701-709df3fec2ac?w=400&q=75'},
  ];
  save();
}

function save(){localStorage.setItem('sori_p',JSON.stringify(products))}

function renderNav(){
  const nav=document.getElementById('nav');
  const cats=['전체',...new Set(products.map(p=>p.category))];
  nav.innerHTML=cats.map(cat=>{
    const on=(cat==='전체'&&currentCat==='all')||(cat===currentCat);
    return`<button class="nav-btn${on?' active':''}" onclick="selectCat('${cat}')">${cat}</button>`;
  }).join('');
}

function selectCat(cat){
  currentCat=cat==='전체'?'all':cat;
  renderNav();renderGrid();
  document.getElementById('grid-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const list=currentCat==='all'?products:products.filter(p=>p.category===currentCat);
  grid.innerHTML=list.map(p=>`
    <div class="card-wrap">
      <div class="card-img"><img src="${p.image}" alt="${p.name}" loading="lazy"></div>
      <div class="card-name">${p.name}</div>
    </div>`).join('');
  initReveal();
  syncCanvas();
}

let revealIO=null;
function initReveal(){
  if(revealIO)revealIO.disconnect();
  revealIO=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const delay=parseInt(e.target.dataset.col||0)*55;
        setTimeout(()=>e.target.classList.add('revealed'),delay);
        revealIO.unobserve(e.target);
      }
    });
  },{threshold:0.06,rootMargin:'0px 0px -20px 0px'});
  const cols=getCols();
  document.querySelectorAll('.card-wrap').forEach((c,i)=>{c.dataset.col=i%cols;revealIO.observe(c)});
}

function getCols(){
  const w=window.innerWidth;
  if(w>=1100)return 5;
  if(w>=860)return 4;
  if(w>=600)return 3;
  if(w>=420)return 2;
  return 1;
}

/* THREE.JS */
let r3,s3,cam3,pts,clk;
const fxC=document.getElementById('fx-canvas');

function initThree(){
  const wrap=document.getElementById('grid-wrap');
  const W=wrap.offsetWidth,H=Math.max(wrap.offsetHeight,300);
  r3=new THREE.WebGLRenderer({canvas:fxC,alpha:true,antialias:false});
  r3.setPixelRatio(Math.min(devicePixelRatio,1.5));
  r3.setSize(W,H);
  r3.setClearColor(0,0);
  s3=new THREE.Scene();
  cam3=new THREE.OrthographicCamera(0,W,H,0,-10,10);
  cam3.position.z=1;
  clk=new THREE.Clock();
  spawnParticles(W,H);
}

function spawnParticles(W,H){
  if(pts)s3.remove(pts);
  const n=Math.min(100,Math.floor(W*H/5000));
  const pos=new Float32Array(n*3);
  const vel=[];
  for(let i=0;i<n;i++){
    pos[i*3]=Math.random()*W;
    pos[i*3+1]=Math.random()*H;
    pos[i*3+2]=0;
    vel.push({x:(Math.random()-.5)*.15,y:-Math.random()*.18-.04});
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const sz=window.innerWidth<420?1.6:2.0;
  const mat=new THREE.PointsMaterial({color:0xD4C9B8,size:sz,sizeAttenuation:false,transparent:true,opacity:0.65});
  pts=new THREE.Points(geo,mat);
  pts._vel=vel;pts._n=n;pts._W=W;pts._H=H;
  s3.add(pts);
}

function syncCanvas(){
  if(!r3)return;
  const wrap=document.getElementById('grid-wrap');
  const W=wrap.offsetWidth,H=Math.max(wrap.offsetHeight,300);
  fxC.style.width=W+'px';fxC.style.height=H+'px';
  r3.setSize(W,H);
  cam3.right=W;cam3.top=H;cam3.updateProjectionMatrix();
  spawnParticles(W,H);
}

function animThree(){
  requestAnimationFrame(animThree);
  if(!pts)return;
  const p=pts.geometry.attributes.position;
  const v=pts._vel,W=pts._W,H=pts._H,n=pts._n;
  const t=clk.getElapsedTime();
  for(let i=0;i<n;i++){
    let x=p.getX(i)+v[i].x+Math.sin(t*.35+i*.8)*.06;
    let y=p.getY(i)+v[i].y;
    if(y<0){y=H;x=Math.random()*W;}
    if(x<0)x=W;if(x>W)x=0;
    p.setXY(i,x,y);
  }
  p.needsUpdate=true;
  r3.render(s3,cam3);
}

function ripple(cx,cy){
  if(!pts)return;
  const rect=fxC.getBoundingClientRect();
  const mx=cx-rect.left,my=cy-rect.top;
  const p=pts.geometry.attributes.position,v=pts._vel,n=pts._n;
  for(let i=0;i<n;i++){
    const dx=p.getX(i)-mx,dy=p.getY(i)-my;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<70&&d>0){const f=(70-d)/70*.45;v[i].x+=(dx/d)*f;v[i].y+=(dy/d)*f;v[i].x*=.9;v[i].y*=.9;}
  }
}
document.getElementById('grid-wrap').addEventListener('mousemove',e=>ripple(e.clientX,e.clientY),{passive:true});
document.getElementById('grid-wrap').addEventListener('touchmove',e=>{if(e.touches[0])ripple(e.touches[0].clientX,e.touches[0].clientY)},{passive:true});

/* MODALS */
function showOv(id){document.getElementById(id).classList.add('show')}
function closeOv(id){document.getElementById(id).classList.remove('show')}
function openAuth(){
  document.getElementById('auth-err').style.display='none';
  document.getElementById('auth-in').value='';
  showOv('auth-ov');
  setTimeout(()=>document.getElementById('auth-in').focus(),100);
}
function checkAuth(){
  if(document.getElementById('auth-in').value===ADMIN_CODE){
    closeOv('auth-ov');updateCatList();renderDelList();showOv('adm-ov');
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===0));
    document.getElementById('tab-add').style.display='block';
    document.getElementById('tab-del').style.display='none';
  }else{document.getElementById('auth-err').style.display='block'}
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-add').style.display=tab==='add'?'block':'none';
  document.getElementById('tab-del').style.display=tab==='del'?'block':'none';
  if(tab==='del')renderDelList();
}
function updateCatList(){
  document.getElementById('cat-list').innerHTML=[...new Set(products.map(p=>p.category))].map(c=>`<option value="${c}">`).join('');
}
function previewImg(input){
  if(!input.files||!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{imgData=e.target.result;const p=document.getElementById('img-prev');p.src=imgData;p.style.display='block'};
  r.readAsDataURL(input.files[0]);
}
function addProduct(){
  const cat=document.getElementById('add-cat').value.trim();
  const name=document.getElementById('add-name').value.trim();
  const err=document.getElementById('add-err'),suc=document.getElementById('add-suc');
  err.style.display='none';suc.style.display='none';
  if(!imgData||!cat||!name){err.textContent='사진, 카테고리, 상품명을 모두 입력해 주세요.';err.style.display='block';return}
  products.push({id:Date.now(),category:cat,name,image:imgData});
  save();suc.style.display='block';
  document.getElementById('add-cat').value='';
  document.getElementById('add-name').value='';
  document.getElementById('img-file').value='';
  document.getElementById('img-prev').style.display='none';
  imgData=null;
  updateCatList();renderNav();renderGrid();
}
function renderDelList(){
  const dl=document.getElementById('del-list');
  if(!products.length){dl.innerHTML='<p style="font-size:13px;color:var(--ink-light);padding:1rem 0">등록된 상품이 없습니다.</p>';return}
  dl.innerHTML=products.map(p=>`
    <div class="di">
      <img src="${p.image}" alt="${p.name}">
      <div class="di-info"><div class="di-cat">${p.category}</div><div class="di-name">${p.name}</div></div>
      <button class="btn-x" onclick="delProduct(${p.id})">✕</button>
    </div>`).join('');
}
function delProduct(id){
  products=products.filter(p=>p.id!==id);save();renderDelList();renderNav();renderGrid();
}

renderNav();
renderGrid();
window.addEventListener('load',()=>{initThree();animThree();setTimeout(syncCanvas,200)});
let rT;
window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(()=>{syncCanvas();initReveal()},200)});
</script>
